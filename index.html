<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Ink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Окно авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2>Chat Ink</h2>
            <div id="auth-error" class="error-msg hidden"></div>
            <input type="text" id="auth-username" placeholder="Имя пользователя" required>
            <input type="password" id="auth-password" placeholder="Пароль" required>
            <button id="btn-login" class="btn-primary">Войти</button>
            <button id="btn-register" class="btn-secondary">Регистрация</button>
        </div>
    </div>

    <!-- Главный экран мессенджера -->
    <div id="main-screen" class="screen hidden">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-summary" id="open-profile">
                    <div class="avatar" id="my-avatar">U</div>
                    <span id="my-username-display">Имя</span>
                </div>
                <button id="btn-theme-toggle" class="btn-icon">🌓</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-id" placeholder="Поиск по 5-значному ID...">
                <button id="btn-add-friend" class="btn-primary">+</button>
            </div>
            <div id="search-error" class="error-msg hidden"></div>

            <div class="contacts-list" id="contacts-container">
                <!-- Сюда динамически добавляются контакты -->
            </div>
        </aside>

        <!-- Окно чата -->
        <main class="chat-area">
            <div id="chat-welcome" class="chat-welcome">
                <p>Выберите чат, чтобы начать общение</p>
            </div>
            
            <div id="chat-active" class="chat-active hidden">
                <header class="chat-header">
                    <div class="chat-info">
                        <span id="active-chat-name">Собеседник</span>
                        <span id="active-chat-id" class="subtext">#00000</span>
                    </div>
                    <button id="btn-delete-friend" class="btn-danger-text">Удалить из друзей</button>
                </header>

                <div class="messages-container" id="messages-container">
                    <!-- Сюда выводятся сообщения -->
                </div>

                <footer class="chat-footer">
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="btn-send-message" class="btn-send">▶</button>
                </footer>
            </div>
        </main>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Ваш профиль</h3>
                <button id="btn-close-profile" class="btn-icon">✕</button>
            </header>
            <div class="modal-body">
                <p><strong>Ваш ID:</strong> <span id="prof-id"></span></p>
                <p><strong>Дата регистрации:</strong> <span id="prof-date"></span></p>
                <div id="profile-error" class="error-msg hidden"></div>
                
                <label>Изменить имя:</label>
                <input type="text" id="prof-username">
                
                <label>Изменить пароль:</label>
                <input type="password" id="prof-password" placeholder="Новый пароль">
                
                <button id="btn-save-profile" class="btn-primary">Сохранить изменения</button>
                <hr>
                <button id="btn-delete-account" class="btn-danger">Удалить аккаунт</button>
            </div>
        </div>
    </div>

    <!-- Скрипт логики (будет предоставлен в следующих частях) -->
    <script src="app.js"></script>
</body>
</html>
